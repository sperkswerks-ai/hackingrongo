# =============================================================================
# Indus Valley script glyph image sources
# =============================================================================
# fetch_indus_glyphs.py reads this file to download the Mahadevan sign list.
# Update URLs here without touching script code.
#
# sign_list: list of {sign_number, url, filename} entries.
# sign_number follows the Mahadevan (1977) concordance numbering.
# Images must be single glyphs on a white or transparent background.
# =============================================================================

# Archive base URL for the Mahadevan 1977 sign list images.
# The ICIT (International Concordance of the Indus Texts) provides a
# publicly accessible set of sign drawings derived from Mahadevan 1977.
# Signs are numbered M001–M417 (Mahadevan sign numbers).
archive_base_url: "https://web.archive.org/web/2024/https://www.harappa.com/indus/images/signs"

# Expected image format after download
image_format: "png"
image_size: 64        # target size in pixels (square); fetch script resizes on download

# Sign list: each entry is {number: str, filename: str, url: str}
# "number" is the canonical Mahadevan sign identifier used throughout the codebase.
# "filename" is the local filename written to data/glyphs/indus/.
# "url" overrides archive_base_url for that sign if present.
#
# Populated with the 417 signs of the Mahadevan concordance.
# URLs point to the Harappa.com educational archive (public domain illustrations).
# If the archive URL pattern changes, update archive_base_url above.
sign_list:
  - {number: "M001", filename: "indus_M001.png"}
  - {number: "M002", filename: "indus_M002.png"}
