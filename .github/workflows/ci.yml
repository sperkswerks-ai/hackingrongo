name: CI

on:
  push:
  pull_request:

# Never pass real IBMQ credentials into any step.
# All quantum steps use --backend statevector (local simulator only).
env:
  IBMQ_TOKEN: ""
  IBMQ_INSTANCE: ""
  PYTHONUNBUFFERED: "1"

jobs:
  test:
    name: "Test suite + quantum smoke"
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── Checkout ──────────────────────────────────────────────────────────
      - uses: actions/checkout@v4

      # ── Python ────────────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: |
            requirements.lock
            requirements.txt

      # ── Install pinned deps ────────────────────────────────────────────────
      # Step 1: install exact transitive closure from requirements.lock.
      # Step 2: install the package itself in editable mode so all imports work.
      - name: Install pinned dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -e ".[dev]"

      # ── Full test suite (step 2) ───────────────────────────────────────────
      # Corpus-dependent tests are skipped automatically when data/corpus/ is
      # absent (each such test guards itself with pytest.mark.skipif).
      - name: Run pytest
        run: |
          pytest tests/ -q --tb=short \
            --ignore=tests/test_pgood.py

      # ── Pipeline argument smoke test (step 3) ─────────────────────────────
      # --dry-run validates ring filtering, step selection, and command
      # construction without requiring corpus data in CI.
      - name: Pipeline --ring 1 --steps 4a,4e smoke (dry-run)
        run: |
          python hackingrongo/pipeline.py \
            --ring 1 \
            --steps 4a,4e \
            --dry-run \
            --seed 20260606

      # ── Simon's algorithm — statevector (step 4) ──────────────────────────
      # Uses the committed fixture: tests/ci-fixtures/parallels/parallel_variants_auto.json
      # --backend statevector → runs on Qiskit's exact local simulator, no IBMQ call.
      - name: Run Simon decipherment (statevector, P007_ADHS)
        run: |
          python scripts/run_simon_decipherment.py \
            --backend statevector \
            --passage P007_ADHS \
            --variants-file tests/ci-fixtures/parallels/parallel_variants_auto.json \
            --output /tmp/ci_simon_out.json

      # ── BV algorithm — statevector (step 4) ───────────────────────────────
      # Uses the committed fixture corpus (2 tablets, 24-sign vocabulary).
      # --n-bits 5 --n-top 16 keeps the circuit small enough for fast simulation.
      - name: Run BV IC analysis (statevector, fixture corpus)
        run: |
          python scripts/run_bv_ic_analysis.py \
            --backend statevector \
            --corpus-dir tests/ci-fixtures/corpus \
            --n-bits 5 \
            --n-top 16 \
            --output /tmp/ci_bv_out.json

      # ── Golden-file comparison (step 5) ───────────────────────────────────
      # Asserts:
      #   Simon: recovered_s_int == 8, period_matches_observation == True
      #   BV:    recovered_s_int == 16, affine_fraction == 1.0, is_null_result == False
      - name: Assert Simon + BV outputs match golden files
        run: |
          python tests/ci-fixtures/check_golden.py \
            --simon-out /tmp/ci_simon_out.json \
            --bv-out    /tmp/ci_bv_out.json

      # ── Upload quantum outputs as artifacts ───────────────────────────────
      - name: Upload quantum output artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quantum-outputs
          path: |
            /tmp/ci_simon_out.json
            /tmp/ci_bv_out.json
          retention-days: 7
